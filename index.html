<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Skyline Dash — Endless Runner</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>

        <!-- ===== MAIN MENU ===== -->
        <section id="main-menu" class="screen active">
            <div class="menu-bg-overlay"></div>
            <div class="menu-content">
                <div class="logo-wrap">
                    <h1 class="game-title">
                        <span class="title-line1">SKYLINE</span>
                        <span class="title-line2">DASH</span>
                    </h1>
                    <p class="game-tagline">Run. Dodge. Survive.</p>
                </div>

                <div class="best-score-chip">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2l2.9 6.9L22 10l-5.5 4.8L18.2 22 12 18.3 5.8 22l1.7-7.2L2 10l7.1-1.1z"/></svg>
                    <span>Best: <strong id="menu-best-score">0</strong> m</span>
                </div>

                <div class="menu-buttons">
                    <button id="btn-play" class="btn btn-primary btn-huge">
                        <span class="btn-label">PLAY</span>
                        <span class="btn-icon">▶</span>
                    </button>

                    <div class="menu-row">
                        <button id="btn-skins" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"/></svg>
                            <span>Skins</span>
                        </button>
                        <button id="btn-daily" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 6h-3V4a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v2H4a1 1 0 0 0-1 1v4a3 3 0 0 0 3 3v5a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-5a3 3 0 0 0 3-3V7a1 1 0 0 0-1-1zM9 4h6v2H9V4zm-3 5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v2H6V9z"/></svg>
                            <span>Daily</span>
                            <span class="notif-dot" id="daily-notif"></span>
                        </button>
                        <button id="btn-settings" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M19.4 13a7.5 7.5 0 0 0 0-2l2-1.6-2-3.4-2.4.9a7.5 7.5 0 0 0-1.8-1L14.8 3h-4l-.4 2.8a7.5 7.5 0 0 0-1.8 1l-2.4-.9-2 3.4 2 1.6a7.5 7.5 0 0 0 0 2l-2 1.6 2 3.4 2.4-.9a7.5 7.5 0 0 0 1.8 1l.4 2.8h4l.4-2.8a7.5 7.5 0 0 0 1.8-1l2.4.9 2-3.4-2-1.6zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg>
                            <span>Settings</span>
                        </button>
                    </div>
                </div>

                <div class="menu-footer">
                    <span class="coin-chip"><span class="coin-icon">●</span><span id="menu-coins">0</span></span>
                </div>
            </div>
        </section>

        <!-- ===== IN-GAME HUD ===== -->
        <section id="hud" class="screen hud-screen">
            <div class="hud-top">
                <div class="hud-left">
                    <div class="distance-display">
                        <span id="hud-distance">0</span><span class="unit">m</span>
                    </div>
                </div>
                <div class="hud-center">
                    <div class="coin-display">
                        <span class="coin-icon">●</span>
                        <span id="hud-coins">0</span>
                    </div>
                </div>
                <div class="hud-right">
                    <button id="btn-pause" class="icon-btn" aria-label="Pause">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
                    </button>
                </div>
            </div>

            <div class="hud-powerups" id="hud-powerups"></div>

            <div class="combo-display" id="combo-display"></div>

            <div class="touch-zones">
                <div class="touch-zone touch-up" data-action="jump"></div>
                <div class="touch-zone touch-down" data-action="slide"></div>
            </div>

            <div class="hint-overlay" id="hint-overlay">
                <div class="hint-card">
                    <div class="hint-row"><kbd>SPACE</kbd><span>or swipe up to Jump</span></div>
                    <div class="hint-row"><kbd>S</kbd><span>or swipe down to Slide</span></div>
                    <p class="hint-tap">Tap to start</p>
                </div>
            </div>
        </section>

        <!-- ===== PAUSE MENU ===== -->
        <section id="pause-menu" class="screen modal-screen">
            <div class="modal-backdrop"></div>
            <div class="modal-card">
                <h2 class="modal-title">Paused</h2>
                <div class="modal-stats">
                    <div><span class="stat-label">Distance</span><strong id="pause-distance">0 m</strong></div>
                    <div><span class="stat-label">Coins</span><strong id="pause-coins">0</strong></div>
                </div>
                <div class="modal-buttons">
                    <button id="btn-resume" class="btn btn-primary">Resume</button>
                    <button id="btn-restart" class="btn btn-secondary">Restart</button>
                    <button id="btn-exit" class="btn btn-ghost">Main Menu</button>
                </div>
            </div>
        </section>

        <!-- ===== GAME OVER ===== -->
        <section id="game-over" class="screen modal-screen">
            <div class="modal-backdrop"></div>
            <div class="modal-card gameover-card">
                <div class="new-record-badge" id="new-record-badge">NEW RECORD!</div>
                <h2 class="modal-title">Run Ended</h2>
                <div class="final-score">
                    <span class="score-label">DISTANCE</span>
                    <div class="score-big"><span id="final-distance">0</span><span class="unit">m</span></div>
                    <div class="score-sub">Best <strong id="final-best">0</strong> m</div>
                </div>
                <div class="modal-stats">
                    <div><span class="stat-label">Coins</span><strong id="final-coins">0</strong></div>
                    <div><span class="stat-label">Total</span><strong id="final-total-coins">0</strong></div>
                </div>
                <div class="modal-buttons">
                    <button id="btn-retry" class="btn btn-primary btn-huge">
                        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4 7.58 4 12s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                            <span>RUN AGAIN</span>
                    </button>
                    <button id="btn-home" class="btn btn-ghost">Main Menu</button>
                </div>
            </div>
        </section>

        <!-- ===== SKINS MODAL ===== -->
        <section id="skins-menu" class="screen modal-screen">
            <div class="modal-backdrop"></div>
            <div class="modal-card wide-card">
                <div class="modal-header">
                    <h2 class="modal-title">Runners</h2>
                    <button class="icon-btn close-btn" data-close>✕</button>
                </div>
                <div class="skins-grid" id="skins-grid"></div>
                <div class="modal-footer">
                    <span class="coin-chip"><span class="coin-icon">●</span><span id="skins-coins">0</span></span>
                </div>
            </div>
        </section>

        <!-- ===== SETTINGS MODAL ===== -->
        <section id="settings-menu" class="screen modal-screen">
            <div class="modal-backdrop"></div>
            <div class="modal-card">
                <div class="modal-header">
                    <h2 class="modal-title">Settings</h2>
                    <button class="icon-btn close-btn" data-close>✕</button>
                </div>
                <div class="settings-list">
                    <label class="setting-row">
                        <span>Sound Effects</span>
                        <input type="checkbox" id="setting-sfx" checked />
                        <span class="toggle"></span>
                    </label>
                    <label class="setting-row">
                        <span>Music</span>
                        <input type="checkbox" id="setting-music" checked />
                        <span class="toggle"></span>
                    </label>
                    <label class="setting-row">
                        <span>Screen Shake</span>
                        <input type="checkbox" id="setting-shake" checked />
                        <span class="toggle"></span>
                    </label>
                    <label class="setting-row">
                        <span>Particles</span>
                        <input type="checkbox" id="setting-particles" checked />
                        <span class="toggle"></span>
                    </label>
                </div>
                <div class="modal-buttons">
                    <button id="btn-reset-progress" class="btn btn-ghost btn-small">Reset Progress</button>
                </div>
            </div>
        </section>

        <!-- ===== DAILY REWARD MODAL ===== -->
        <section id="daily-menu" class="screen modal-screen">
            <div class="modal-backdrop"></div>
            <div class="modal-card">
                <div class="modal-header">
                    <h2 class="modal-title">Daily Reward</h2>
                    <button class="icon-btn close-btn" data-close>✕</button>
                </div>
                <p class="daily-sub">Come back every day for better rewards.</p>
                <div class="daily-grid" id="daily-grid"></div>
                <div class="modal-buttons">
                    <button id="btn-claim-daily" class="btn btn-primary">Claim</button>
                </div>
            </div>
        </section>

        <!-- ===== FLOATING TOAST ===== -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="game.js"></script>
    <script src="main.js"></script>
</body>
</html>
